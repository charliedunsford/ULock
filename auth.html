<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<link rel="stylesheet" href="css/style.css">
		<title>Sign Up | ULock</title>
		<link rel="apple-touch-icon" sizes="180x180" href="icon/apple-touch-icon.png">
		<link rel="icon" type="image/png" sizes="32x32" href="icon/favicon-32x32.png">
		<link rel="icon" type="image/png" sizes="16x16" href="icon/favicon-16x16.png">
		<link rel="manifest" href="icon/site.webmanifest">
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
	</head>
	<body>
		<main class="main--wrapper-auth">
			<form action="vault.html" id="signup__form" class="auth__form">
				<div>
					<h1 class="auth__text--large">Sign up</h1>
					<p class="auth__text">Create an account or <a href=# id="show--signin">Sign In</a></p>
				</div>
				<div class="field--wrapper">
					<label class="auth__text" for="name">Full name</label>
					<input class="auth__input" type="text" id="name" name="name" required>
					<label class="auth__text" for="username">Username</label>
					<input class="auth__input" type="text" id="username" name="username" required>
					<label class="auth__text" for="password">Password</label>
					<input class="auth__input" type="password" id="password" name="password" required>
				</div>
				<button type="submit" class="header__link header__link--fancy">Sign Up</button>
				<p class="footer__text--center">By signing up to create an account, you are accepting our <a href=#>terms of service</a> and <a href=#>privacy policy</a></p>
			</form>



			<form action="vault.html" id="signin__form" class="auth__form hidden">
				<div>
					<h1 class="auth__text--large">Sign in</h1>
					<p class="auth__text">Sign in or <a href=# id="show--signup">create an account</a></p>
				</div>
				<div class="field--wrapper">
					<label class="auth__text" for="username">Username</label>
					<input class="auth__input" type="text" id="username" name="username" required>
					<label class="auth__text" for="password">Password</label>
					<input class="auth__input" type="password" id="password" name="password" required>
				</div>
				<button type="submit" class="header__link header__link--fancy">Sign In</button>
			</form>
		</main>
		<script src="auth.js"></script>
	</body>
</html>
