<div class="profile__div">
	<img class="profile__img" src="https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Fi.pinimg.com%2F736x%2F2c%2F47%2Fd5%2F2c47d5dd5b532f83bb55c4cd6f5bd1ef.jpg&f=1&nofb=1&ipt=4ca1073973b23a681edcc0b780221059ea3d9e6a8d3b2af7ba98bc8cf7ed4739">
	<p class="username__text">{{ username || 'User' }}</p>
</div>

<div class="menu__div">
	<div class="menu__item"><p class="menu__item-text">All items</p></div>
</div>

<div class="action__div">
	<button class="action__button menu__item-text" (click)="logout()">Log out</button>
	<button class="action__button menu__item-text" (click)="settings()">Settings</button>
</div>
