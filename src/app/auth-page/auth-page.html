<main>
    <!-- SIGN IN FORM -->
    <form [formGroup]="signinForm" [class.active]="formType === 'signin'" (ngSubmit)="onSigninSubmit()">
	    <div>
	    	<h1 class="auth__text--large">Sign in</h1>
	    	<p class="auth__text">Sign in or <a href="#" (click)="toggleForm('signup'); $event.preventDefault()">Create an account</a></p>
	    </div>
	    <div class="field--wrapper">
	    	<label class="auth__text" for="username">Username</label>
	    	<input class="auth__input" type="text" id="username" formControlName="username" required>
	    	<label class="auth__text" for="password">Password</label>
	    	<input class="auth__input" type="password" id="password" formControlName="password" required>
	    </div>
	    <button type="submit" class="header__link header__link--fancy">Sign In</button>
    </form>

    <!-- SIGN UP FORM -->
    <form [formGroup]="signupForm" [class.active]="formType === 'signup'" (ngSubmit)="onSignupSubmit()">
    	<div>
	    	<h1 class="auth__text--large">Sign up</h1>
	    	<p class="auth__text">Create an account or <a href="#" (click)="toggleForm('signin'); $event.preventDefault()">Sign In</a></p>
	    </div>
	    <div class="field--wrapper">
	    	<label class="auth__text" for="name">Full name</label>
	    	<input class="auth__input" type="text" id="name" formControlName="name" required>

	    	<label class="auth__text" for="username">Username</label>
	    	<input class="auth__input" type="text" id="username" formControlName="username" required>

	    	<label class="auth__text" for="password">Password</label>
	    	<input class="auth__input" type="password" id="password" formControlName="password" required>
	    </div>
	    <button type="submit" class="header__link header__link--fancy">Sign Up</button>
	    <p class="footer__text--center">By signing up to create an account, you are accepting our <a href=#>terms of service</a> and <a href=#>privacy policy</a></p>
    </form>
</main>
