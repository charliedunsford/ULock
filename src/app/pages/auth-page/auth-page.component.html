<main>
    <div class="form-container">
        <form>
            <div>
                <h1 class="auth__text--large">Sign up</h1>
                <p class="auth__text">
                    @if (true) { Create an account or <a href="#" >Sign In</a> }
                    @else { Sign in or <a href="#" >Create an account</a> }</p>
            </div>

            <div class="field--wrapper">
                <label class="auth__text" for="username">Username</label>
                <input class="auth__input" type="text" id="username" name="signupUsername" required>

                <label class="auth__text" for="password">Password</label>
                <input class="auth__input" type="password" id="password" name="signupPassword" required>
            </div>
            <button type="submit" class="header__link header__link--fancy">Sign up</button>
        </form>

        @if (true) {
            <div class="error-message">
                    error message
            </div>
        }
        @if (false) {
            <div class="validation-errors">
                <ul>
                </ul>
            </div>
        }
    </div>
</main>
